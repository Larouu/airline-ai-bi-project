<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" role="img" aria-label="SkyInsight">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1A3263"/>
      <stop offset="55%"  stop-color="#3F5E78"/>
      <stop offset="100%" stop-color="#547792"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>

  <!-- Gold border ring -->
  <rect width="100" height="100" rx="22" fill="none" stroke="#FFC570" stroke-width="2.5" stroke-opacity="0.75"/>

  <!-- Radar circles -->
  <circle cx="50" cy="44" r="18" fill="none" stroke="#FFC570" stroke-opacity="0.25" stroke-width="0.75" stroke-dasharray="3 2.5"/>
  <circle cx="50" cy="44" r="28" fill="none" stroke="#FFC570" stroke-opacity="0.12" stroke-width="0.75" stroke-dasharray="3 2.5"/>

  <!-- Flight arc (dashed trajectory) -->
  <path d="M 18 65 Q 50 18 82 65" fill="none" stroke="#FFC570" stroke-width="1.2" stroke-dasharray="5 3.5" opacity="0.55"/>

  <!-- Trailing dots (behind the plane) -->
  <circle cx="37.2" cy="45.3" r="1.5" fill="#FFC570" opacity="0.35"/>
  <circle cx="43.6" cy="42.4" r="2"   fill="#FFC570" opacity="0.60"/>

  <!-- Plane at arc midpoint (50, 41.5) — top-view, pointing right -->
  <g filter="url(#glow)" transform="translate(50, 41.5)">
    <g fill="#FFD693">
      <!-- Fuselage -->
      <ellipse cx="0.5" cy="0" rx="7" ry="1.9"/>
      <!-- Left wing -->
      <path d="M 1 -1.5 L -2.5 -8.5 L -4.5 -7.5 L -1.5 -1.5 Z"/>
      <!-- Right wing -->
      <path d="M 1  1.5 L -2.5  8.5 L -4.5  7.5 L -1.5  1.5 Z"/>
      <!-- Left tail fin -->
      <path d="M -4 -1.2 L -7 -4 L -5.8 -1.2 Z"/>
      <!-- Right tail fin -->
      <path d="M -4  1.2 L -7  4 L -5.8  1.2 Z"/>
    </g>
  </g>

  <!-- Analytics bars (base heights) -->
  <rect x="26" y="81" width="5" height="9"  rx="1.5" fill="#FFC570" opacity="0.75"/>
  <rect x="34" y="77" width="5" height="13" rx="1.5" fill="#FFC570" opacity="0.75"/>
  <rect x="42" y="79" width="5" height="11" rx="1.5" fill="#FFC570" opacity="0.75"/>
  <rect x="50" y="75" width="5" height="15" rx="1.5" fill="#FFC570" opacity="0.75"/>
  <rect x="58" y="80" width="5" height="10" rx="1.5" fill="#FFC570" opacity="0.75"/>
  <rect x="67" y="78" width="5" height="12" rx="1.5" fill="#FFC570" opacity="0.75"/>
</svg>
