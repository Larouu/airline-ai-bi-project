<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" role="img" aria-label="SkyInsight animated logo">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1A3263"/>
      <stop offset="55%"  stop-color="#3F5E78"/>
      <stop offset="100%" stop-color="#547792"/>
    </linearGradient>

    <!-- Plane glow -->
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Dot glow -->
    <filter id="dot-glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Shared arc path for animateMotion -->
    <path id="arc" d="M 18 65 Q 50 18 82 65"/>
  </defs>

  <!-- ── Background ────────────────────────────────────────── -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>

  <!-- ── Outer pulse ring ──────────────────────────────────── -->
  <rect width="100" height="100" rx="22" fill="none" stroke="#FFC570" stroke-width="2.5">
    <animate attributeName="stroke-opacity" values="0.75;0;0.75"   dur="2.8s" repeatCount="indefinite"/>
    <animate attributeName="stroke-width"   values="2.5;6;2.5"     dur="2.8s" repeatCount="indefinite"/>
  </rect>

  <!-- ── Radar circle 1 (slow CW rotation) ───────────────── -->
  <circle cx="50" cy="44" r="18" fill="none" stroke="#FFC570" stroke-opacity="0.25" stroke-width="0.75" stroke-dasharray="3 2.5">
    <animateTransform attributeName="transform" type="rotate"
      from="0 50 44" to="360 50 44" dur="12s" repeatCount="indefinite"/>
  </circle>

  <!-- ── Radar circle 2 (slow CCW rotation) ──────────────── -->
  <circle cx="50" cy="44" r="28" fill="none" stroke="#FFC570" stroke-opacity="0.12" stroke-width="0.75" stroke-dasharray="3 2.5">
    <animateTransform attributeName="transform" type="rotate"
      from="360 50 44" to="0 50 44" dur="18s" repeatCount="indefinite"/>
  </circle>

  <!-- ── Flight arc (dashed) ──────────────────────────────── -->
  <path d="M 18 65 Q 50 18 82 65" fill="none" stroke="#FFC570"
        stroke-width="1.2" stroke-dasharray="5 3.5" opacity="0.55"/>

  <!-- ── Trailing dot 2 (furthest behind) ─────────────────── -->
  <circle r="1.5" fill="#FFC570" opacity="0.35" filter="url(#dot-glow)">
    <animateMotion dur="3s" repeatCount="indefinite" begin="-2.45s">
      <mpath href="#arc"/>
    </animateMotion>
  </circle>

  <!-- ── Trailing dot 1 (closer behind) ───────────────────── -->
  <circle r="2" fill="#FFC570" opacity="0.60" filter="url(#dot-glow)">
    <animateMotion dur="3s" repeatCount="indefinite" begin="-2.72s">
      <mpath href="#arc"/>
    </animateMotion>
  </circle>

  <!-- ── Plane (animates along arc, auto-rotates) ─────────── -->
  <g filter="url(#glow)">
    <animateMotion dur="3s" repeatCount="indefinite" rotate="auto">
      <mpath href="#arc"/>
    </animateMotion>
    <g fill="#FFD693">
      <ellipse cx="0.5" cy="0" rx="7" ry="1.9"/>
      <path d="M 1 -1.5 L -2.5 -8.5 L -4.5 -7.5 L -1.5 -1.5 Z"/>
      <path d="M 1  1.5 L -2.5  8.5 L -4.5  7.5 L -1.5  1.5 Z"/>
      <path d="M -4 -1.2 L -7 -4 L -5.8 -1.2 Z"/>
      <path d="M -4  1.2 L -7  4 L -5.8  1.2 Z"/>
    </g>
  </g>

  <!-- ── Analytics bars ───────────────────────────────────── -->
  <rect x="26" y="81" width="5" height="9"  rx="1.5" fill="#FFC570" opacity="0.75">
    <animate attributeName="height" values="9;14;9"   dur="1.8s" repeatCount="indefinite" begin="0.0s"/>
    <animate attributeName="y"      values="81;76;81" dur="1.8s" repeatCount="indefinite" begin="0.0s"/>
  </rect>
  <rect x="34" y="77" width="5" height="13" rx="1.5" fill="#FFC570" opacity="0.75">
    <animate attributeName="height" values="13;18;13" dur="2.1s" repeatCount="indefinite" begin="0.3s"/>
    <animate attributeName="y"      values="77;72;77" dur="2.1s" repeatCount="indefinite" begin="0.3s"/>
  </rect>
  <rect x="42" y="79" width="5" height="11" rx="1.5" fill="#FFC570" opacity="0.75">
    <animate attributeName="height" values="11;16;11" dur="1.9s" repeatCount="indefinite" begin="0.6s"/>
    <animate attributeName="y"      values="79;74;79" dur="1.9s" repeatCount="indefinite" begin="0.6s"/>
  </rect>
  <rect x="50" y="75" width="5" height="15" rx="1.5" fill="#FFC570" opacity="0.75">
    <animate attributeName="height" values="15;20;15" dur="2.2s" repeatCount="indefinite" begin="0.9s"/>
    <animate attributeName="y"      values="75;70;75" dur="2.2s" repeatCount="indefinite" begin="0.9s"/>
  </rect>
  <rect x="58" y="80" width="5" height="10" rx="1.5" fill="#FFC570" opacity="0.75">
    <animate attributeName="height" values="10;15;10" dur="1.7s" repeatCount="indefinite" begin="1.2s"/>
    <animate attributeName="y"      values="80;75;80" dur="1.7s" repeatCount="indefinite" begin="1.2s"/>
  </rect>
  <rect x="67" y="78" width="5" height="12" rx="1.5" fill="#FFC570" opacity="0.75">
    <animate attributeName="height" values="12;17;12" dur="2.0s" repeatCount="indefinite" begin="1.5s"/>
    <animate attributeName="y"      values="78;73;78" dur="2.0s" repeatCount="indefinite" begin="1.5s"/>
  </rect>
</svg>
